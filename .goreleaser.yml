version: 2
project_name: opencode-native

before:
  hooks:
    - go mod tidy

builds:
  - id: "opencode-build"
    main: ./main.go
    binary: opencode
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/MerrukTechnology/OpenCode-Native/internal/version.Version={{.Version}}

archives:
  - id: "opencode-archive"
    builds:
      - opencode-build # Explicitly link to the build above
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}aarch64
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  github:
    owner: MerrukTechnology
    name: OpenCode-Native

brews:
  - name: opencode
    ids:
      - opencode-archive # Matches the archive ID above
    repository:
      owner: "MerrukTechnology"
      name: "homebrew-tap"
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    license: "MIT"
    homepage: "https://github.com/MerrukTechnology/OpenCode-Native"
    description: "Lightweight, native AI coding agent optimized for performance."
    install: |
      bin.install "opencode"

aurs:
  - name: "opencode-native-bin"
    # FIX: Point to the correct archive ID
    ids:
      - opencode-archive
    homepage: "https://github.com/MerrukTechnology/OpenCode-Native"
    description: "Lightweight, native AI coding agent optimized for performance."
    maintainers:
      - "Merruk Technology <yahyaclub@gmail.com>"
    license: "MIT"
    private_key: "{{ .Env.AUR_KEY }}"
    git_url: "ssh://aur@aur.archlinux.org/opencode-native-bin.git"
    provides:
      - opencode
    conflicts:
      - opencode
    package: |-
      install -Dm755 ./opencode "${pkgdir}/usr/bin/opencode"

nfpms:
  - maintainer: "MerrukTechnology"
    # FIX: Point to the correct archive ID
    id: opencode-archive
    homepage: "https://github.com/MerrukTechnology/OpenCode-Native"
    description: "Lightweight, native AI coding agent optimized for performance."
    license: "MIT"
    formats:
      - deb
      - rpm
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^doc:"
      - "^test:"
      - "^ci:"
      - "^ignore:"
      - "^example:"
      - "^wip:"